PackageUrl: https://github.com/this-senda/senda
License: MIT
LicenseUrl: https://github.com/this-senda/senda/blob/main/LICENSE
ShortDescription: A fast, lightweight, git-native API client for developers.
Description: >-
  Senda is a desktop API client where every collection is a plain folder of YAML
  files. No cloud account, no proprietary sync, no binary blobs. Open a
  collection, send requests, and commit the diff. Built with Wails (Go) and
  SolidJS for a tiny binary and low memory footprint. This package installs both
  the desktop app (senda) and the headless CLI runner (senda-cli).
Moniker: senda
