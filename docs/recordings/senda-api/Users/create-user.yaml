name: Create user
method: POST
url: http://{{base_url}}/v1/users
headers:
    - key: Content-Type
      value: application/json
      enabled: true
body:
    type: json
    raw: |-
        {
          "name": "Grace Hopper",
          "email": "grace@senda.dev",
          "role": "admin"
        }
auth:
    type: bearer
    token: "{{token}}"
