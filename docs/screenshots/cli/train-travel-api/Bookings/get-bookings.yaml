name: get-bookings
method: GET
url: '{{baseUrl}}/bookings'
params:
    - key: page
      value: "1"
      enabled: false
      desc: The page number to return
      type: integer
    - key: limit
      value: "10"
      enabled: false
      desc: The number of items to return per page
      type: integer
body:
    type: none
auth:
    type: oauth2
    grant: client_credentials
    tokenUrl: https://example.com/oauth/token
    clientId: '{{clientId}}'
    clientSecret: '{{clientSecret}}'
    scope: read write
asserts:
    - target: status
      op: eq
      value: "200"
      enabled: true
docs: |-
    **List existing bookings**

    Returns a list of all trip bookings by the authenticated user.
responseExample: |-
    {
      "data": [
        {
          "has_bicycle": true,
          "has_dog": true,
          "id": "efdbb9d1-02c2-4bc3-afb7-6788d8782b1e",
          "passenger_name": "John Doe",
          "trip_id": "efdbb9d1-02c2-4bc3-afb7-6788d8782b1e"
        },
        {
          "has_bicycle": false,
          "has_dog": false,
          "id": "b2e783e1-c824-4d63-b37a-d8d698862f1d",
          "passenger_name": "Jane Smith",
          "trip_id": "b2e783e1-c824-4d63-b37a-d8d698862f1d"
        }
      ],
      "links": {
        "next": "https://api.example.com/bookings?page=2",
        "self": "https://api.example.com/bookings"
      }
    }
spec:
    file: train-travel-api.yaml
    operationId: get-bookings
