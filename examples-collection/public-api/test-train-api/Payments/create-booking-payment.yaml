name: create-booking-payment
method: POST
url: '{{baseUrl}}/bookings/{{bookingId}}/payment'
pathParams:
    - key: bookingId
      value: 1725ff48-ab45-4bb5-9d02-88745177dedb
      enabled: true
      desc: The ID of the booking to pay for.
      type: string
headers:
    - key: Content-Type
      value: application/json
      enabled: true
body:
    type: json
    raw: |-
        {
          "amount": 49.99,
          "currency": "gbp",
          "source": {
            "address_city": "London",
            "address_country": "gb",
            "address_line1": "123 Fake Street",
            "address_line2": "4th Floor",
            "address_post_code": "N12 9XX",
            "cvc": "123",
            "exp_month": 12,
            "exp_year": 2025,
            "name": "J. Doe",
            "number": "4242424242424242",
            "object": "card"
          }
        }
    fields:
        - key: id
          value: ""
          enabled: false
          desc: Unique identifier for the payment. This will be a unique identifier for the payment, and is used to reference the payment in other objects.
          type: string
        - key: amount
          value: ""
          enabled: false
          desc: Amount intended to be collected by this payment. A positive decimal figure describing the amount to be collected.
          type: number
        - key: currency
          value: ""
          enabled: false
          desc: Three-letter [ISO currency code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase.
          type: string
        - key: source
          value: ""
          enabled: false
          desc: The payment source to take the payment from. This can be a card or a bank account. Some of these properties will be hidden on read to protect PII leaking.
        - key: status
          value: ""
          enabled: false
          desc: The status of the payment, one of `pending`, `succeeded`, or `failed`.
          type: string
auth:
    type: oauth2
    grant: client_credentials
    tokenUrl: https://example.com/oauth/token
    clientId: '{{clientId}}'
    clientSecret: '{{clientSecret}}'
    scope: read write
asserts:
    - target: status
      op: eq
      value: "200"
      enabled: true
docs: |-
    **Pay for a Booking**

    A payment is an attempt to pay for the booking, which will confirm the booking for the user and enable them to get their tickets.
responseExample: |-
    {
      "amount": 49.99,
      "currency": "gbp",
      "id": "2e3b4f5a-6b7c-8d9e-0f1a-2b3c4d5e6f7a",
      "links": {
        "booking": "https://api.example.com/bookings/1725ff48-ab45-4bb5-9d02-88745177dedb/payment"
      },
      "source": {
        "address_country": "gb",
        "address_post_code": "N12 9XX",
        "cvc": "123",
        "exp_month": 12,
        "exp_year": 2025,
        "name": "J. Doe",
        "number": "************4242",
        "object": "card"
      },
      "status": "succeeded"
    }
spec:
    file: train-travel-api.yaml
    operationId: create-booking-payment
