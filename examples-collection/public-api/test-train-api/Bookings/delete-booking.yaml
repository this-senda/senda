name: delete-booking
method: DELETE
url: '{{baseUrl}}/bookings/{{bookingId}}'
pathParams:
    - key: bookingId
      value: 1725ff48-ab45-4bb5-9d02-88745177dedb
      enabled: true
      desc: The ID of the booking to retrieve.
      type: string
body:
    type: none
auth:
    type: oauth2
    grant: client_credentials
    tokenUrl: https://example.com/oauth/token
    clientId: '{{clientId}}'
    clientSecret: '{{clientSecret}}'
    scope: read write
asserts:
    - target: status
      op: eq
      value: "204"
      enabled: true
docs: |-
    **Delete a booking**

    Deletes a booking, cancelling the hold on the trip.
spec:
    file: train-travel-api.yaml
    operationId: delete-booking
