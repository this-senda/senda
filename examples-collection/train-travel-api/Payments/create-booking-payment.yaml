name: create-booking-payment
method: POST
url: https://try.microcks.io/rest/Train+Travel+API/1.0.0/bookings/{{bookingId}}/payment
headers:
    - key: Content-Type
      value: application/json
      enabled: true
body:
    type: json
    raw: |-
        {
          "amount": 49.99,
          "currency": "gbp",
          "source": {
            "address_city": "London",
            "address_country": "gb",
            "address_line1": "123 Fake Street",
            "address_line2": "4th Floor",
            "address_post_code": "N12 9XX",
            "cvc": "123",
            "exp_month": 12,
            "exp_year": 2025,
            "name": "J. Doe",
            "number": "4242424242424242",
            "object": "card"
          }
        }
auth:
    type: inherit
docs: |-
    **Pay for a Booking**

    A payment is an attempt to pay for the booking, which will confirm the booking for the user and enable them to get their tickets.
