name: get-trips
method: GET
url: https://try.microcks.io/rest/Train+Travel+API/1.0.0/trips
params:
    - key: page
      value: ""
      enabled: false
      desc: The page number to return
    - key: limit
      value: ""
      enabled: false
      desc: The number of items to return per page
    - key: origin
      value: ""
      enabled: false
      desc: The ID of the origin station
    - key: destination
      value: ""
      enabled: false
      desc: The ID of the destination station
    - key: date
      value: ""
      enabled: false
      desc: The date and time of the trip in ISO 8601 format in origin station's timezone.
    - key: bicycles
      value: ""
      enabled: false
      desc: Only return trips where bicycles are known to be allowed
    - key: dogs
      value: ""
      enabled: false
      desc: Only return trips where dogs are known to be allowed
body:
    type: none
auth:
    type: inherit
docs: |-
    **Get available train trips**

    Returns a list of available train trips between the specified origin and destination stations on the given date, and allows for filtering by bicycle and dog allowances.
