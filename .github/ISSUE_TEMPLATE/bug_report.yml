name: Bug report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before reporting, check [existing issues](https://github.com/this-senda/senda/issues).

  - type: input
    id: version
    attributes:
      label: Senda version
      description: Shown in the titlebar or `./senda-desktop --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux (Arch)
        - Linux (Ubuntu / Debian)
        - Linux (other)
        - macOS
        - Windows
    validations:
      required: true

  - type: input
    id: webview
    attributes:
      label: WebKit version (Linux only)
      description: "`webkit2gtk-4.1` or `webkitgtk-6.0`"
      placeholder: "webkit2gtk-4.1"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open collection at …
        2. Click …
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Run `wails dev` and paste any console output. Wrap in ` ```  ``` `.
      render: shell
