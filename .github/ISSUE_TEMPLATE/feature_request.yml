name: Feature request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check the [roadmap](https://github.com/this-senda/senda/blob/main/docs/roadmap.md) and
        [existing issues](https://github.com/this-senda/senda/issues) first — your idea may
        already be shipped or planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or friction point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: I checked the roadmap and this is not already planned
        - label: I searched existing issues and this is not a duplicate
