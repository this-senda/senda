name: Screenshots

# Regenerate the desktop documentation screenshots + GIF and commit them back.
#   • desktop — Playwright against `vite --mode test` (hand-written Wails binding
#     stubs + a capture-time mock backend) → docs/screenshots/
# The terminal (TUI/CLI) assets are regenerated LOCALLY (`task shots:tui` /
# `shots:cli`, pure Go; or the `:vhs` variants); they are not generated in CI.
# Run manually after UI changes.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to capture and commit to
        required: false
        default: ""

permissions:
  contents: write

jobs:
  capture:
    name: Capture screenshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      # GitHub runners can reach Playwright's browser CDN, so let it manage the
      # browser. (Locally, where that host may be blocked, set SENDA_CHROME to a
      # Chrome-for-Testing build instead — see docs/screenshots/README.md.)
      - name: Install Playwright Chromium
        working-directory: frontend
        run: bunx playwright install --with-deps chromium

      - name: Capture screenshots + GIF
        working-directory: frontend
        run: bun run shots

      - name: Copy into docs/screenshots
        run: |
          cp frontend/tests/visual/__screenshots__/*.png docs/screenshots/
          cp frontend/tests/visual/__screenshots__/*.gif docs/screenshots/

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/screenshots; then
            echo "No screenshot changes."
            exit 0
          fi
          git add docs/screenshots
          git commit -m "docs: regenerate desktop screenshots and walkthrough GIF"
          git push

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: frontend/tests/visual/__screenshots__/
