name: Release

# Fires only on semver tags. Stable (v1.2.3) cuts a full release + Homebrew bump;
# prerelease (v1.2.3-rc.1) is flagged as a GitHub pre-release and skips Homebrew.
#
# Each archive bundles two binaries at its root: the desktop app (`senda-desktop`) and
# the unified pure-Go binary (`senda`: TUI + headless run/mock/docs + gui launcher).
# Asset names follow the convention the
# installers and packaging expect (scripts/install.{sh,ps1}, packaging/*):
#   senda_<version>_<os>-<arch>.tar.gz   (linux, darwin)
#   senda_<version>_<os>-<arch>.zip      (windows)
#   checksums.txt                        (sha256 of every archive)
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  # release-please can't fire the tag-push path above: a tag it pushes with the
  # default GITHUB_TOKEN won't trigger another workflow. Instead it dispatches
  # this one on the new tag ref, so GITHUB_REF_NAME is still the tag — every step
  # below works unchanged for both entry points.
  workflow_dispatch:

permissions:
  contents: write # create the release and upload assets

jobs:
  # Tags can be pushed off any commit; only release tags that land on main.
  guard:
    name: Tag is on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tagged commit is reachable from main
        run: |
          if ! git branch -r --contains "$GITHUB_SHA" | grep -qE 'origin/main$'; then
            echo "::error::Tag $GITHUB_REF_NAME ($GITHUB_SHA) is not on origin/main"
            exit 1
          fi

  build:
    name: Build ${{ matrix.name }}
    needs: guard
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-amd64, runner: ubuntu-24.04, taskns: linux, bin: senda-desktop, os: linux }
          - { name: linux-arm64, runner: ubuntu-24.04-arm, taskns: linux, bin: senda-desktop, os: linux }
          - { name: darwin-arm64, runner: macos-14, taskns: darwin, bin: senda-desktop, os: macos }
          - { name: windows-amd64, runner: windows-latest, taskns: windows, bin: senda-desktop.exe, os: windows }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun deps
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ runner.arch }}-

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Must run before `go install wails3`: the alpha2.104 CLI links GTK4 +
      # webkitgtk-6.0, so the dev libs have to exist when go builds it.
      # If 6.0 dev libs are ever missing on the image, fall back to `-tags gtk3`
      # with libwebkit2gtk-4.1-dev (see Taskfile.yml header).
      - name: Install Linux webview deps
        if: matrix.os == 'linux'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libgtk-4-dev libwebkitgtk-6.0-dev
          version: 1.0

      - name: Cache wails3 CLI
        id: cache-wails3
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails3${{ matrix.os == 'windows' && '.exe' || '' }}
          key: wails3-${{ runner.os }}-${{ runner.arch }}-v3.0.0-alpha2.104

      - name: Install wails3 CLI
        if: steps.cache-wails3.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.104

      # `package` is a uniform alias on every OS namespace: linux/windows just
      # build the desktop binary, darwin additionally bundles Senda.app + Senda.dmg.
      - name: Build
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}" task ${{ matrix.taskns }}:package

      # senda is pure Go (no webview/CGO), so the native runner produces the
      # correct arch directly. Same version stamp as the desktop binary.
      - name: Build senda
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ext=""
          [ "${{ matrix.os }}" = "windows" ] && ext=".exe"
          CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X senda/internal/buildinfo.Version=${VERSION} -X senda/internal/buildinfo.Commit=${COMMIT} -X senda/internal/buildinfo.Date=${DATE}" \
            -o "bin/senda${ext}" ./cmd/senda

      - name: Archive (tar.gz)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ART="senda_${VERSION}_${{ matrix.name }}.tar.gz"
          # Ship the app icon in the Linux archive so install.sh can register a
          # .desktop entry without a separate network fetch. macOS uses the
          # bundled .icns in Senda.app, so it doesn't need this.
          extra=""
          if [ "${{ matrix.os }}" = "linux" ]; then
            cp docs/logo/senda-mark-256.png bin/senda.png
            extra="senda.png"
          fi
          tar -C bin -czf "$ART" senda-desktop senda $extra
          shasum -a 256 "$ART" > "$ART.sha256"

      - name: Archive (zip)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $v = "$env:GITHUB_REF_NAME" -replace '^v',''
          $art = "senda_${v}_${{ matrix.name }}.zip"
          Compress-Archive -Path bin/senda-desktop.exe,bin/senda.exe -DestinationPath $art
          $hash = (Get-FileHash $art -Algorithm SHA256).Hash.ToLower()
          "$hash  $art" | Out-File "$art.sha256" -Encoding ascii -NoNewline

      # GUI download asset for macOS (mounts as a Dock-installable .app). The
      # tar.gz above still ships for install.sh / Homebrew (raw CLI-style binaries).
      - name: Archive (dmg)
        if: matrix.os == 'macos'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ART="senda_${VERSION}_${{ matrix.name }}.dmg"
          mv bin/Senda.dmg "$ART"
          shasum -a 256 "$ART" > "$ART.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            senda_*.tar.gz
            senda_*.zip
            senda_*.dmg
            senda_*.sha256

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.meta.outputs.prerelease }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Aggregate checksums + detect prerelease
        id: meta
        run: |
          cd dist
          cat *.sha256 > checksums.txt
          rm -f *.sha256
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/senda_*.tar.gz
            dist/senda_*.zip
            dist/senda_*.dmg
            dist/checksums.txt

  homebrew:
    name: Update Homebrew cask
    needs: release
    if: needs.release.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.release.outputs.version }}
      TAP_REPO: this-senda/homebrew-tap
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Render and push cask
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_REPO_PAT_TOKEN }}
        run: |
          set -euo pipefail
          arm_file="senda_${VERSION}_darwin-arm64.tar.gz"
          arm_sha=$(shasum -a 256 "dist/$arm_file" | awk '{print $1}')
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/${TAP_REPO}.git" tap
          mkdir -p tap/Casks
          cat > tap/Casks/senda.rb <<EOF
          cask "senda" do
            version "${VERSION}"

            depends_on arch: :arm64
            url "${base}/${arm_file}"
            sha256 "${arm_sha}"

            name "Senda"
            desc "Fast, git-native API client"
            homepage "https://github.com/${GITHUB_REPOSITORY}"

            binary "senda-desktop"
            binary "senda"
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/senda.rb
          git commit -m "senda ${VERSION}"
          git push
