name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "packaging/**"
      - ".release-please-manifest.json"
      - "release-please-config.json"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "packaging/**"
      - ".release-please-manifest.json"
      - "release-please-config.json"
      - "LICENSE"

jobs:
  # Generate the TS bindings once and share them as an artifact. Split from the
  # Go tests so `backend` and `frontend` can run in parallel — both used to wait
  # on the whole Go job just for this artifact.
  bindings:
    name: Generate bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # wails3 generate compiles the Go services to introspect them, so it needs
      # the GTK4 + WebKitGTK dev libs the desktop package imports.
      - name: Install GTK4 + WebKitGTK 6.0 (required by Wails imports)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libgtk-4-dev libwebkitgtk-6.0-dev
          version: 1.0

      - name: Cache wails3 CLI
        id: cache-wails3
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails3
          key: wails3-${{ runner.os }}-${{ runner.arch }}-v3.0.0-alpha2.104

      - name: Install wails3 CLI
        if: steps.cache-wails3.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.104

      # This job and `backend` share one setup-go module cache (key = go.sum
      # hash), and setup-go won't overwrite an existing key. `wails3 generate`
      # only compiles the desktop app graph, which never imports internal/tui —
      # so without this, whichever job saves first can freeze a cache missing
      # the TUI/charm deps, and `backend`'s `go vet ./...` re-downloads them
      # every run. Download the full module graph so the saved cache is complete.
      - name: Prime full module cache (shared with Go tests job)
        run: go mod download

      - name: Generate TypeScript bindings
        run: TERM=dumb wails3 generate bindings -clean -ts

      - name: Upload generated bindings
        uses: actions/upload-artifact@v4
        with:
          name: wails-bindings
          path: frontend/bindings/

  backend:
    name: Go tests
    runs-on: ubuntu-latest
    # No dependency on bindings (those are TS); runs from t=0 alongside it.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # The default (no build tag) Wails path targets GTK4 + webkitgtk-6.0 in
      # alpha2.104, so `go vet`/`go test` need those dev libs to compile
      # the desktop package (matches .github/workflows/release.yml).
      - name: Install GTK4 + WebKitGTK 6.0 (required by Wails imports)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libgtk-4-dev libwebkitgtk-6.0-dev
          version: 1.0

      - name: Create frontend/dist placeholder for go:embed
        run: mkdir -p frontend/dist && touch frontend/dist/index.html

      - name: vet
        run: go vet ./...

      - name: fmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt diff:"
            echo "$out"
            exit 1
          fi

      - name: test
        run: go test ./...

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    needs: bindings
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun deps
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ runner.arch }}-

      - name: Download generated bindings
        uses: actions/download-artifact@v4
        with:
          name: wails-bindings
          path: frontend/bindings/

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: frontend
        run: bun run typecheck

      - name: Unit tests
        working-directory: frontend
        run: bun run test --run

  e2e:
    name: E2E smoke (WebKit)
    runs-on: ubuntu-latest
    needs: bindings
    # WebKit's apt deps (~30s) reinstall every run since the runner is
    # ephemeral, so keep this off PRs. Push only fires on main per the trigger.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun deps
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ runner.arch }}-

      - name: Download generated bindings
        uses: actions/download-artifact@v4
        with:
          name: wails-bindings
          path: frontend/bindings/

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      # Cache the downloaded browser binary (~100 MB), keyed on the pinned
      # Playwright version in the lockfile.
      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      # --with-deps installs WebKit's full system libs (fonts + GL/mesa +
      # gstreamer). Tried trimming to Playwright's direct deps to cache the apt
      # layer, but WebKit's renderer crashes without the recommends tier, so we
      # take the reliable path. The browser binary download is still cached
      # above; the apt step (~30s, ephemeral runner) is the accepted residual.
      # Run the pinned local binary, not bunx (which would pull a newer rev and
      # miss the browser cache).
      - name: Install Playwright WebKit
        working-directory: frontend
        run: ./node_modules/.bin/playwright install --with-deps webkit

      - name: Run smoke tests
        working-directory: frontend
        run: bun run test:e2e
