name: PR Title

# Squash-merge collapses a PR into a single commit whose message is the PR
# title, so the title must be a valid Conventional Commit for release-please to
# classify it. This lints the title (not the branch commits) on every edit.
on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    name: Conventional Commit title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types — keep in sync with release-please-config.json sections.
          types: |
            feat
            fix
            perf
            refactor
            docs
            ci
            chore
            test
            style
            build
            revert
          # Scope optional (feat: ... ) but if present must be lower-kebab.
          requireScope: false
